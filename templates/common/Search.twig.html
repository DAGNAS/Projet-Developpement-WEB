{% extends "LoggedBase.twig.html" %}



{% block stylesheets %}
    <link rel="stylesheet" href="assets/style/pages/Search.css">
{% endblock %}


{% block content %}
<section class="search-section">
    <h1>Trouvez votre future entreprise</h1>
    <div class="search-bar">
        <input type="text" placeholder="Nom de l'entreprise, secteur...">
        <input type="text" placeholder="Localisation (ex: La Rochelle)">
        <button class="search-btn">Rechercher</button>
    </div>
</section>

<section class="results-container">
    {% for company in companies %}
        <div class="company-grid">
            <div class="company-card">
                <div class="company-logo">
                    <img src="assets/images/menu/body/enterprise-icone.png" alt="Logo Entreprise">
                </div>
                <div class="company-info">
                    <h3>{{ company.nom }}</h3>
                    <p class="sector">Secteur : {{ company.secteur }}</p>
                    <p class="location">📍 {{ company.localisation }}</p>
                    <a href="#" class="view-btn">Voir les offres</a>
                </div>
            </div>
        </div>
    {% endfor %}
</section>
{% endblock %}
